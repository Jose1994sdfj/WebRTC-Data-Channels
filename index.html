<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Tasks P2P · WebRTC</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0A0A">
    <link rel="manifest" id="manifest-placeholder">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#0A0A0A;min-height:100vh;color:#FFF;padding:16px}
        .app{max-width:600px;margin:0 auto}
        h1{background:linear-gradient(135deg,#6C4DFF,#00D2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
        .panel{background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1)}
        .btn{background:#6C4DFF;color:white;border:none;padding:12px 20px;border-radius:25px;cursor:pointer;margin:5px;font-size:14px}
        .btn-secondary{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
        .task-input{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:25px;color:white;margin-bottom:10px}
        .task-item{display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:8px}
        .member-item{display:flex;justify-content:space-between;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:5px}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#FF6D00;display:inline-block}
        .status-dot.connected{background:#00C853}
        #session-link{width:100%;padding:10px;background:#000;border:1px solid #6C4DFF;border-radius:10px;color:#6C4DFF;margin:10px 0;font-size:12px}
        .hidden{display:none}
        .notification{position:fixed;top:20px;right:20px;background:#6C4DFF;padding:15px 25px;border-radius:30px;animation:slideIn 0.3s;z-index:1000}
        .log-panel{background:#000;border-radius:10px;padding:10px;margin-top:10px;font-family:monospace;font-size:11px;max-height:150px;overflow-y:auto}
        .error-banner{background:rgba(255,50,50,0.2);border:1px solid #ff3333;border-radius:10px;padding:10px;margin-bottom:15px}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    </style>
</head>
<body>
    <div class="app">
        <h1>👥 Team Tasks P2P</h1>
        
        <div class="panel">
            <h3>🔗 Conexión P2P</h3>
            
            <div id="connection-status" style="margin-bottom:15px;padding:10px;background:rgba(108,77,255,0.2);border-radius:10px">
                ⚡ Estado: <span id="status-text">Desconectado</span>
            </div>
            
            <div id="ice-status" style="margin-bottom:15px;padding:5px;font-size:12px;color:#888"></div>
            
            <div id="members-list">
                <div class="member-item">
                    <span>👤 <span id="my-name-display">Yo</span> (Tú)</span>
                    <span class="status-dot connected"></span>
                </div>
            </div>
            <div id="peers-container"></div>
            
            <button class="btn" id="create-session-btn">🔗 Crear Sesión</button>
            <button class="btn btn-secondary" id="join-session-btn">📥 Unirse a Sesión</button>
            <button class="btn btn-secondary" id="change-name-btn">✏️ Cambiar Nombre</button>
            
            <div id="session-info" class="hidden">
                <p>📤 Comparte este link con OTRO dispositivo:</p>
                <input type="text" id="session-link" readonly>
                <button class="btn btn-secondary" id="copy-link-btn">📋 Copiar</button>
                <button class="btn btn-secondary" id="share-link-btn">📤 Compartir</button>
            </div>
            
            <div class="log-panel" id="log-panel">
                <div>🟢 Sistema iniciado</div>
            </div>
        </div>
        
        <div class="panel">
            <h3>📋 Tareas</h3>
            <input type="text" class="task-input" id="task-input" placeholder="Nueva tarea...">
            <select id="assignee-select" style="width:100%;padding:10px;background:#000;color:white;border-radius:25px;margin-bottom:10px">
                <option value="">Asignar a...</option>
            </select>
            <button class="btn" id="add-task-btn">➕ Añadir Tarea</button>
            
            <div id="task-list" style="margin-top:20px">
                <p style="color:#666;text-align:center">No hay tareas</p>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // CONFIGURACIÓN PWA
        // ================================================================
        const manifest = {
            name: "Team Tasks P2P",
            short_name: "TeamTasks",
            theme_color: "#0A0A0A",
            background_color: "#0A0A0A",
            display: "standalone",
            start_url: "/",
            icons: [{
                src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230A0A0A'/%3E%3Ctext x='50' y='65' font-size='45' text-anchor='middle' fill='%236C4DFF'%3E👥%3C/text%3E%3C/svg%3E",
                sizes: "192x192"
            }]
        };
        document.getElementById('manifest-placeholder').href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("data:application/javascript,self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)))");
        }
        
        // ================================================================
        // FUNCIÓN DE LOG
        // ================================================================
        function log(message, isError = false) {
            console.log(message);
            const panel = document.getElementById('log-panel');
            const div = document.createElement('div');
            div.textContent = message;
            div.style.color = isError ? '#ff6666' : '#fff';
            panel.appendChild(div);
            panel.scrollTop = panel.scrollHeight;
            if (panel.children.length > 15) {
                panel.removeChild(panel.children[0]);
            }
        }
        
        // ================================================================
        // SERVIDORES ICE (STUN + TURN) - CONFIGURACIÓN ROBUSTA
        // ================================================================
        const iceServers = [
            // STUN de Google (gratuito)
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            
            // STUN alternativos
            { urls: 'stun:stun.stunprotocol.org:3478' },
            { urls: 'stun:stun.voipbuster.com:3478' },
            
            // TURN de Metered.ca (gratuito, límite 0.5GB/mes)
            {
                urls: 'turn:a.relay.metered.ca:80',
                username: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1',
                credential: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1'
            },
            {
                urls: 'turn:a.relay.metered.ca:80?transport=tcp',
                username: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1',
                credential: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1'
            },
            {
                urls: 'turn:a.relay.metered.ca:443',
                username: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1',
                credential: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1'
            },
            {
                urls: 'turn:a.relay.metered.ca:443?transport=tcp',
                username: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1',
                credential: 'a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1'
            },
            
            // TURN de OpenRelay (gratuito, público)
            {
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            {
                urls: 'turn:openrelay.metered.ca:443',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ];
        
        log(`🧊 Configurados ${iceServers.length} servidores ICE (STUN + TURN)`);
        
        // ================================================================
        // ESTADO PERSISTENTE
        // ================================================================
        let myId = localStorage.getItem('p2p-id');
        if (!myId) {
            myId = 'device-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('p2p-id', myId);
        }
        
        let myName = localStorage.getItem('p2p-name') || 'Usuario' + Math.floor(Math.random()*100);
        localStorage.setItem('p2p-name', myName);
        
        document.getElementById('my-name-display').textContent = myName;
        
        // Estado WebRTC
        let peerConnection = null;
        let dataChannel = null;
        const peers = new Map();
        let tasks = [];
        
        // UI Elements
        const statusText = document.getElementById('status-text');
        const iceStatus = document.getElementById('ice-status');
        const membersDiv = document.getElementById('peers-container');
        const sessionInfo = document.getElementById('session-info');
        const sessionLink = document.getElementById('session-link');
        const taskList = document.getElementById('task-list');
        const assigneeSelect = document.getElementById('assignee-select');
        
        // ================================================================
        // CREAR SESIÓN
        // ================================================================
        async function createSession() {
            log('🔄 Creando sesión...');
            statusText.textContent = 'Creando sesión...';
            
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = new RTCPeerConnection({ iceServers });
            
            dataChannel = peerConnection.createDataChannel('tasks', { ordered: true });
            setupDataChannel(dataChannel);
            
            peerConnection.ondatachannel = (event) => {
                log('📥 Canal entrante recibido');
                setupDataChannel(event.channel);
            };
            
            // Monitoreo detallado de ICE
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    log(`🧊 Candidato: ${event.candidate.type} ${event.candidate.protocol || ''}`);
                } else {
                    log('✅ Recolección de candidatos completada');
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                const state = peerConnection.iceConnectionState;
                iceStatus.textContent = `ICE: ${state}`;
                log(`🧊 Estado ICE: ${state}`);
                
                if (state === 'failed') {
                    log('❌ Conexión ICE fallida - posible problema de firewall', true);
                    statusText.textContent = 'Error de conexión';
                } else if (state === 'connected' || state === 'completed') {
                    log('✅ Conexión ICE establecida');
                    statusText.textContent = 'Conectado ✓';
                } else if (state === 'checking') {
                    statusText.textContent = 'Verificando conexión...';
                }
            };
            
            peerConnection.onconnectionstatechange = () => {
                const state = peerConnection.connectionState;
                log(`📡 Estado conexión: ${state}`);
                
                if (state === 'connected') {
                    statusText.textContent = 'Conectado ✓';
                } else if (state === 'failed') {
                    log('❌ Conexión fallida', true);
                    statusText.textContent = 'Conexión fallida';
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            log('📤 Oferta creada, esperando candidatos...');
            
            const candidates = [];
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    candidates.push(event.candidate);
                } else {
                    log(`✅ ${candidates.length} candidatos recolectados`);
                    
                    const sessionData = {
                        sdp: peerConnection.localDescription,
                        candidates: candidates
                    };
                    
                    const encoded = btoa(JSON.stringify(sessionData));
                    const link = window.location.origin + window.location.pathname + '?join=' + encoded;
                    
                    sessionLink.value = link;
                    sessionInfo.classList.remove('hidden');
                    
                    log('🔗 Link generado');
                }
            };
        }
        
        // ================================================================
        // UNIRSE A SESIÓN
        // ================================================================
        async function joinSession(encodedData) {
            log('🔄 Uniéndose a sesión...');
            statusText.textContent = 'Uniéndose...';
            
            try {
                const sessionData = JSON.parse(atob(encodedData));
                log(`📦 Datos: ${sessionData.candidates.length} candidatos`);
                
                if (peerConnection) {
                    peerConnection.close();
                }
                
                peerConnection = new RTCPeerConnection({ iceServers });
                
                peerConnection.oniceconnectionstatechange = () => {
                    const state = peerConnection.iceConnectionState;
                    iceStatus.textContent = `ICE: ${state}`;
                    log(`🧊 Estado ICE: ${state}`);
                    
                    if (state === 'connected' || state === 'completed') {
                        statusText.textContent = 'Conectado ✓';
                    }
                };
                
                peerConnection.onconnectionstatechange = () => {
                    log(`📡 Estado: ${peerConnection.connectionState}`);
                };
                
                peerConnection.ondatachannel = (event) => {
                    log('📥 Canal recibido');
                    setupDataChannel(event.channel);
                };
                
                await peerConnection.setRemoteDescription(sessionData.sdp);
                log('📥 Oferta remota establecida');
                
                for (const candidate of sessionData.candidates) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch(e) {
                        log(`⚠️ Error candidato: ${e.message}`);
                    }
                }
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                log('📤 Respuesta enviada');
                
            } catch(e) {
                log(`❌ Error: ${e.message}`, true);
                alert('Error al unirse: ' + e.message);
            }
        }
        
        // ================================================================
        // CONFIGURAR DATA CHANNEL
        // ================================================================
        function setupDataChannel(channel) {
            const peerId = 'peer-' + Date.now();
            
            channel.onopen = () => {
                log('📡 Canal ABIERTO');
                statusText.textContent = 'Conectado ✓';
                
                channel.send(JSON.stringify({
                    type: 'info',
                    peerId: myId,
                    name: myName
                }));
                
                updateMembersList();
                updateAssigneeSelect();
            };
            
            channel.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.type === 'info') {
                        peers.set(msg.peerId, { channel, name: msg.name });
                        updateMembersList();
                        updateAssigneeSelect();
                        showNotification(`👋 ${msg.name} se conectó`);
                        
                    } else if (msg.type === 'new-task') {
                        if (!tasks.find(t => t.id === msg.task.id)) {
                            tasks.push(msg.task);
                            renderTasks();
                            if (msg.task.assigneeId === myId) {
                                showNotification(`📋 ${msg.task.title}`);
                            }
                        }
                        
                    } else if (msg.type === 'complete-task') {
                        const task = tasks.find(t => t.id === msg.taskId);
                        if (task) {
                            task.completed = true;
                            renderTasks();
                        }
                    }
                } catch(e) {
                    log(`❌ Error mensaje: ${e.message}`);
                }
            };
            
            channel.onclose = () => {
                log('📡 Canal CERRADO');
                peers.delete(peerId);
                updateMembersList();
                updateAssigneeSelect();
            };
            
            peers.set(peerId, { channel, name: 'Conectando...' });
        }
        
        // ================================================================
        // FUNCIONES AUXILIARES
        // ================================================================
        function broadcast(msg) {
            peers.forEach(peer => {
                if (peer.channel.readyState === 'open') {
                    peer.channel.send(JSON.stringify(msg));
                }
            });
        }
        
        function updateMembersList() {
            let html = '';
            peers.forEach((peer) => {
                html += `<div class="member-item">
                    <span>👤 ${peer.name}</span>
                    <span class="status-dot ${peer.channel.readyState === 'open' ? 'connected' : ''}"></span>
                </div>`;
            });
            membersDiv.innerHTML = html;
        }
        
        function updateAssigneeSelect() {
            let options = '<option value="">Asignar a...</option>';
            options += `<option value="${myId}">${myName} (Yo)</option>`;
            peers.forEach((peer, id) => {
                options += `<option value="${id}">${peer.name}</option>`;
            });
            assigneeSelect.innerHTML = options;
        }
        
        function renderTasks() {
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="color:#666;text-align:center">No hay tareas</p>';
                return;
            }
            
            taskList.innerHTML = tasks.map(task => {
                const assigneeName = task.assigneeId === myId ? myName : 
                                   (peers.get(task.assigneeId)?.name || 'Desconocido');
                return `<div class="task-item" style="opacity:${task.completed?0.5:1}">
                    <div>
                        <div>${task.title}</div>
                        <small style="color:#6C4DFF">👤 ${assigneeName}</small>
                    </div>
                    <div>
                        ${task.assigneeId === myId && !task.completed ? 
                            `<button class="btn btn-secondary" style="padding:5px 10px" onclick="completeTask('${task.id}')">✅</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function addTask(title, assigneeId) {
            const task = {
                id: 'task-' + Date.now(),
                title: title,
                assigneeId: assigneeId || myId,
                completed: false
            };
            
            tasks.push(task);
            renderTasks();
            broadcast({ type: 'new-task', task: task });
        }
        
        window.completeTask = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = true;
                renderTasks();
                broadcast({ type: 'complete-task', taskId: taskId });
            }
        };
        
        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // ================================================================
        // EVENT LISTENERS
        // ================================================================
        document.getElementById('create-session-btn').addEventListener('click', createSession);
        
        document.getElementById('join-session-btn').addEventListener('click', () => {
            const link = prompt('Pega el link de la sesión:');
            if (link) {
                const url = new URL(link);
                const encoded = url.searchParams.get('join');
                if (encoded) joinSession(encoded);
            }
        });
        
        document.getElementById('change-name-btn').addEventListener('click', () => {
            const newName = prompt('Tu nombre:', myName);
            if (newName) {
                myName = newName;
                localStorage.setItem('p2p-name', newName);
                document.getElementById('my-name-display').textContent = myName;
                updateAssigneeSelect();
            }
        });
        
        document.getElementById('copy-link-btn').addEventListener('click', () => {
            sessionLink.select();
            document.execCommand('copy');
            showNotification('📋 Link copiado');
        });
        
        document.getElementById('share-link-btn').addEventListener('click', async () => {
            const link = sessionLink.value;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Team Tasks', text: 'Únete', url: link });
                } catch(e) {}
            } else {
                sessionLink.select();
                document.execCommand('copy');
                showNotification('📋 Link copiado');
            }
        });
        
        document.getElementById('add-task-btn').addEventListener('click', () => {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (title) {
                addTask(title, assigneeSelect.value);
                input.value = '';
            }
        });
        
        // Verificar link en URL
        const params = new URLSearchParams(window.location.search);
        if (params.has('join')) {
            log('🔗 Link de unión detectado');
            setTimeout(() => {
                if (confirm('¿Unirse a esta sesión?')) {
                    joinSession(params.get('join'));
                }
            }, 500);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        updateAssigneeSelect();
        renderTasks();
        
        log(`✅ Sistema listo. ID: ${myId}`);
        log(`🔧 TURN configurado para máxima compatibilidad`);
        
    </script>
</body>
</html>

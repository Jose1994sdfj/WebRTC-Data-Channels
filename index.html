<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Tasks · Conexión Garantizada</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0A0A">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#0A0A0A;min-height:100vh;color:#FFF;padding:16px}
        .app{max-width:600px;margin:0 auto}
        h1{background:linear-gradient(135deg,#6C4DFF,#00D2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
        .panel{background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1)}
        .btn{background:#6C4DFF;color:white;border:none;padding:12px 20px;border-radius:25px;cursor:pointer;margin:5px;font-size:14px}
        .btn-secondary{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
        .btn-success{background:#00C853}
        .task-input{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:25px;color:white;margin-bottom:10px}
        .task-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:8px}
        .member-item{display:flex;justify-content:space-between;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:5px}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#FF6D00;display:inline-block}
        .status-dot.connected{background:#00C853}
        .room-id{font-family:monospace;background:#000;padding:8px;border-radius:8px;text-align:center;margin:10px 0}
        .notification{position:fixed;top:20px;right:20px;background:#6C4DFF;padding:15px 25px;border-radius:30px;animation:slideIn 0.3s;z-index:1000}
        .hidden{display:none}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        select{width:100%;padding:12px;background:#000;color:white;border:1px solid rgba(255,255,255,0.2);border-radius:25px;margin-bottom:10px}
    </style>
</head>
<body>
    <div class="app">
        <h1>👥 Team Tasks</h1>
        
        <div class="panel">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
                <span class="status-dot" id="connection-dot"></span>
                <span id="connection-status">Desconectado</span>
            </div>
            
            <div style="margin-bottom:15px">
                <label>Tu nombre:</label>
                <input type="text" id="name-input" class="task-input" style="margin-top:5px">
            </div>
            
            <div style="margin-bottom:15px">
                <label>Sala (mismo nombre = mismo equipo):</label>
                <input type="text" id="room-input" class="task-input" style="margin-top:5px" placeholder="ej: equipo-ventas">
            </div>
            
            <button class="btn btn-success" id="connect-btn">🔌 Conectar al Equipo</button>
            
            <div id="room-info" class="hidden">
                <p style="margin-top:15px">🏠 Sala: <strong id="room-name-display"></strong></p>
                <p>👥 Miembros conectados: <span id="member-count">1</span></p>
            </div>
        </div>
        
        <div class="panel">
            <h3>👤 Miembros del Equipo</h3>
            <div id="members-list"></div>
        </div>
        
        <div class="panel">
            <h3>📋 Tareas</h3>
            <input type="text" class="task-input" id="task-input" placeholder="Nueva tarea...">
            <select id="assignee-select">
                <option value="">Asignar a...</option>
            </select>
            <button class="btn" id="add-task-btn">➕ Añadir Tarea</button>
            
            <div id="task-list" style="margin-top:20px">
                <p style="color:#666;text-align:center">No hay tareas</p>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // CONFIGURACIÓN
        // ================================================================
        
        // Servidor WebSocket PÚBLICO (gratuito)
        const WS_URL = 'wss://broadcast-channel-server.onrender.com';
        
        // Estado
        let ws = null;
        let myName = localStorage.getItem('team-name') || '';
        let myId = localStorage.getItem('team-id');
        let currentRoom = localStorage.getItem('team-room') || '';
        let connected = false;
        let members = new Map();
        let tasks = [];
        
        if (!myId) {
            myId = 'user-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('team-id', myId);
        }
        
        // UI Elements
        const nameInput = document.getElementById('name-input');
        const roomInput = document.getElementById('room-input');
        const connectBtn = document.getElementById('connect-btn');
        const connectionDot = document.getElementById('connection-dot');
        const connectionStatus = document.getElementById('connection-status');
        const roomInfo = document.getElementById('room-info');
        const roomNameDisplay = document.getElementById('room-name-display');
        const memberCount = document.getElementById('member-count');
        const membersList = document.getElementById('members-list');
        const taskList = document.getElementById('task-list');
        const assigneeSelect = document.getElementById('assignee-select');
        const taskInput = document.getElementById('task-input');
        
        // Cargar datos guardados
        nameInput.value = myName;
        roomInput.value = currentRoom;
        
        // ================================================================
        // CONEXIÓN WEBSOCKET
        // ================================================================
        
        function connect() {
            const name = nameInput.value.trim();
            const room = roomInput.value.trim();
            
            if (!name || !room) {
                alert('Por favor ingresa tu nombre y una sala');
                return;
            }
            
            myName = name;
            currentRoom = room;
            localStorage.setItem('team-name', myName);
            localStorage.setItem('team-room', currentRoom);
            
            if (ws) {
                ws.close();
            }
            
            connectionStatus.textContent = 'Conectando...';
            connectionDot.style.background = '#FF6D00';
            
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('✅ Conectado al servidor');
                
                // Unirse a la sala
                ws.send(JSON.stringify({
                    type: 'join',
                    room: currentRoom,
                    name: myName,
                    userId: myId
                }));
                
                connected = true;
                connectionStatus.textContent = 'Conectado ✓';
                connectionDot.style.background = '#00C853';
                roomInfo.classList.remove('hidden');
                roomNameDisplay.textContent = currentRoom;
                
                showNotification('✅ Conectado al equipo');
            };
            
            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch(e) {
                    console.error('Error parseando mensaje:', e);
                }
            };
            
            ws.onclose = () => {
                console.log('❌ Desconectado');
                connected = false;
                connectionStatus.textContent = 'Desconectado';
                connectionDot.style.background = '#FF6D00';
                members.clear();
                updateMembersList();
            };
            
            ws.onerror = (error) => {
                console.error('Error WebSocket:', error);
                connectionStatus.textContent = 'Error de conexión';
                showNotification('❌ Error de conexión');
            };
        }
        
        function handleMessage(msg) {
            switch(msg.type) {
                case 'room-info':
                    // Lista de miembros en la sala
                    members.clear();
                    msg.members.forEach(m => {
                        members.set(m.userId, m);
                    });
                    updateMembersList();
                    updateAssigneeSelect();
                    break;
                    
                case 'member-joined':
                    members.set(msg.member.userId, msg.member);
                    updateMembersList();
                    updateAssigneeSelect();
                    showNotification(`👋 ${msg.member.name} se unió`);
                    break;
                    
                case 'member-left':
                    members.delete(msg.userId);
                    updateMembersList();
                    updateAssigneeSelect();
                    break;
                    
                case 'new-task':
                    if (!tasks.find(t => t.id === msg.task.id)) {
                        tasks.push(msg.task);
                        renderTasks();
                        if (msg.task.assigneeId === myId) {
                            showNotification(`📋 Nueva tarea: ${msg.task.title}`);
                        }
                    }
                    break;
                    
                case 'complete-task':
                    const task = tasks.find(t => t.id === msg.taskId);
                    if (task) {
                        task.completed = true;
                        renderTasks();
                    }
                    break;
                    
                case 'task-sync':
                    msg.tasks.forEach(t => {
                        if (!tasks.find(ex => ex.id === t.id)) {
                            tasks.push(t);
                        }
                    });
                    renderTasks();
                    break;
                    
                case 'error':
                    alert(msg.message);
                    break;
            }
        }
        
        function send(message) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(message));
            }
        }
        
        // ================================================================
        // UI
        // ================================================================
        
        function updateMembersList() {
            memberCount.textContent = members.size + 1;
            
            let html = `<div class="member-item">
                <span>👤 ${myName} (Tú)</span>
                <span class="status-dot connected"></span>
            </div>`;
            
            members.forEach(member => {
                html += `<div class="member-item">
                    <span>👤 ${member.name}</span>
                    <span class="status-dot connected"></span>
                </div>`;
            });
            
            membersList.innerHTML = html;
        }
        
        function updateAssigneeSelect() {
            let options = '<option value="">Asignar a...</option>';
            options += `<option value="${myId}">${myName} (Yo)</option>`;
            members.forEach((member, id) => {
                options += `<option value="${id}">${member.name}</option>`;
            });
            assigneeSelect.innerHTML = options;
        }
        
        function renderTasks() {
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="color:#666;text-align:center">No hay tareas</p>';
                return;
            }
            
            taskList.innerHTML = tasks.map(task => {
                const assignee = task.assigneeId === myId ? myName : 
                                (members.get(task.assigneeId)?.name || 'Desconocido');
                return `<div class="task-item" style="opacity:${task.completed?0.5:1}">
                    <div>
                        <div style="font-weight:500">${task.title}</div>
                        <small style="color:#6C4DFF">👤 ${assignee}</small>
                    </div>
                    <div>
                        ${task.assigneeId === myId && !task.completed ? 
                            `<button class="btn btn-secondary" style="padding:5px 10px" onclick="completeTask('${task.id}')">✅</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function addTask(title, assigneeId) {
            const task = {
                id: 'task-' + Date.now() + '-' + Math.random().toString(36),
                title: title,
                assigneeId: assigneeId || myId,
                createdBy: myId,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.push(task);
            renderTasks();
            
            send({
                type: 'new-task',
                room: currentRoom,
                task: task
            });
        }
        
        window.completeTask = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = true;
                renderTasks();
                send({
                    type: 'complete-task',
                    room: currentRoom,
                    taskId: taskId
                });
            }
        };
        
        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // ================================================================
        // EVENT LISTENERS
        // ================================================================
        
        connectBtn.addEventListener('click', connect);
        
        document.getElementById('add-task-btn').addEventListener('click', () => {
            const title = taskInput.value.trim();
            if (!title) {
                alert('Escribe una tarea');
                return;
            }
            if (!connected) {
                alert('Conéctate primero al equipo');
                return;
            }
            addTask(title, assigneeSelect.value);
            taskInput.value = '';
        });
        
        // Auto-conectar si hay datos guardados
        if (myName && currentRoom) {
            setTimeout(connect, 500);
        }
        
        console.log('🟢 Sistema listo. ID:', myId);
        
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Tasks P2P</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Team Tasks">
    <meta name="theme-color" content="#0A0A0A">
    
    <!-- Manifest PWA -->
    <link rel="manifest" id="manifest-placeholder">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:#0A0A0A;min-height:100vh;color:#FFF;padding:16px}
        .app{max-width:600px;margin:0 auto}
        h1{background:linear-gradient(135deg,#6C4DFF,#00D2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
        .panel{background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1)}
        .btn{background:#6C4DFF;color:white;border:none;padding:12px 20px;border-radius:25px;cursor:pointer;margin:5px;font-size:14px}
        .btn-secondary{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
        .task-input{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:25px;color:white;margin-bottom:10px}
        .task-item{display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:8px}
        .member-item{display:flex;justify-content:space-between;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:5px}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#FF6D00;display:inline-block}
        .status-dot.connected{background:#00C853}
        #session-link{width:100%;padding:10px;background:#000;border:1px solid #6C4DFF;border-radius:10px;color:#6C4DFF;margin:10px 0;font-size:12px}
        .hidden{display:none}
        .notification{position:fixed;top:20px;right:20px;background:#6C4DFF;padding:15px 25px;border-radius:30px;animation:slideIn 0.3s;z-index:1000}
        .install-banner{background:#6C4DFF;padding:15px;border-radius:15px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    </style>
</head>
<body>
    <div class="app">
        <h1>👥 Team Tasks P2P</h1>
        
        <!-- Banner de instalación PWA -->
        <div id="install-banner" class="install-banner hidden">
            <span>📲 Instalar como app</span>
            <button class="btn" id="install-btn" style="background:white;color:#6C4DFF">Instalar</button>
        </div>
        
        <div class="panel">
            <h3>🔗 Conexión P2P</h3>
            <div id="members-list">
                <div class="member-item">
                    <span>👤 <span id="my-name-display">Yo</span> (Tú)</span>
                    <span class="status-dot connected"></span>
                </div>
            </div>
            <div id="peers-container"></div>
            
            <button class="btn" id="create-session-btn">🔗 Crear Sesión</button>
            <button class="btn btn-secondary" id="join-session-btn">📥 Unirse a Sesión</button>
            <button class="btn btn-secondary" id="change-name-btn">✏️ Cambiar Nombre</button>
            
            <div id="session-info" class="hidden">
                <p>📤 Comparte este link:</p>
                <input type="text" id="session-link" readonly>
                <button class="btn btn-secondary" id="copy-link-btn">📋 Copiar</button>
                <button class="btn btn-secondary" id="share-link-btn">📤 Compartir</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>📋 Tareas</h3>
            <input type="text" class="task-input" id="task-input" placeholder="Nueva tarea...">
            <select id="assignee-select" style="width:100%;padding:10px;background:#000;color:white;border-radius:25px;margin-bottom:10px">
                <option value="">Asignar a...</option>
            </select>
            <button class="btn" id="add-task-btn">➕ Añadir Tarea</button>
            
            <div id="task-list" style="margin-top:20px">
                <p style="color:#666;text-align:center">No hay tareas</p>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // PWA MANIFEST (Generado dinámicamente)
        // ================================================================
        const manifest = {
            name: "Team Tasks P2P",
            short_name: "TeamTasks",
            description: "Asignación de tareas en tiempo real sin servidor",
            theme_color: "#0A0A0A",
            background_color: "#0A0A0A",
            display: "standalone",
            orientation: "portrait",
            scope: "/",
            start_url: "/",
            icons: [
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230A0A0A'/%3E%3Ctext x='50' y='65' font-size='45' text-anchor='middle' fill='%236C4DFF'%3E👥%3C/text%3E%3C/svg%3E",
                    sizes: "192x192",
                    type: "image/svg+xml"
                },
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230A0A0A'/%3E%3Ctext x='50' y='65' font-size='45' text-anchor='middle' fill='%236C4DFF'%3E👥%3C/text%3E%3C/svg%3E",
                    sizes: "512x512",
                    type: "image/svg+xml"
                }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        const manifestURL = URL.createObjectURL(manifestBlob);
        document.getElementById('manifest-placeholder').href = manifestURL;
        
        // ================================================================
        // SERVICE WORKER (Para que funcione como PWA)
        // ================================================================
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => {
                    console.log('📦 SW: Instalado');
                    e.waitUntil(self.skipWaiting());
                });
                self.addEventListener('activate', (e) => {
                    console.log('✅ SW: Activado');
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, { scope: '/' })
                .then(() => console.log('✅ SW registrado'));
        }
        
        // ================================================================
        // INSTALACIÓN PWA
        // ================================================================
        let deferredPrompt = null;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });
        
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`📲 Instalación: ${outcome}`);
                deferredPrompt = null;
                document.getElementById('install-banner').classList.add('hidden');
            }
        });
        
        // Detectar si ya está instalada
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('✅ Ejecutando como PWA instalada');
        }
        
        // ================================================================
        // ESTADO PERSISTENTE (SOLUCIÓN AL PROBLEMA DEL NOMBRE QUE CAMBIA)
        // ================================================================
        
        // Obtener o crear ID persistente
        let myId = localStorage.getItem('p2p-persistent-id');
        if (!myId) {
            myId = 'device-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('p2p-persistent-id', myId);
        }
        console.log('🆔 ID Persistente:', myId);
        
        // Obtener o crear nombre persistente
        let myName = localStorage.getItem('p2p-persistent-name');
        if (!myName) {
            myName = 'Usuario' + Math.floor(Math.random() * 1000);
            localStorage.setItem('p2p-persistent-name', myName);
        }
        
        // Estado
        let peerConnection = null;
        let dataChannel = null;
        const peers = new Map();
        let tasks = [];
        
        // Cargar tareas guardadas localmente
        const savedTasks = localStorage.getItem('p2p-tasks');
        if (savedTasks) {
            try {
                tasks = JSON.parse(savedTasks);
            } catch(e) {}
        }
        
        // Guardar tareas cuando cambien
        function saveTasks() {
            localStorage.setItem('p2p-tasks', JSON.stringify(tasks));
        }
        
        // UI Elements
        const membersDiv = document.getElementById('peers-container');
        const sessionInfo = document.getElementById('session-info');
        const sessionLink = document.getElementById('session-link');
        const taskList = document.getElementById('task-list');
        const assigneeSelect = document.getElementById('assignee-select');
        
        document.getElementById('my-name-display').textContent = myName;
        
        // ================================================================
        // CREAR SESIÓN
        // ================================================================
        
        async function createSession() {
            console.log('🔄 Creando sesión...');
            
            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            
            dataChannel = peerConnection.createDataChannel('tasks');
            setupDataChannel(dataChannel);
            
            peerConnection.ondatachannel = (event) => {
                console.log('📥 Canal entrante recibido');
                setupDataChannel(event.channel);
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            const candidates = [];
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    candidates.push(event.candidate);
                } else {
                    const sessionData = {
                        sdp: peerConnection.localDescription,
                        candidates: candidates
                    };
                    
                    const encoded = btoa(JSON.stringify(sessionData));
                    const link = window.location.origin + window.location.pathname + '?join=' + encoded;
                    
                    sessionLink.value = link;
                    sessionInfo.classList.remove('hidden');
                    
                    console.log('✅ Sesión creada');
                    showNotification('🔗 Sesión creada. Comparte el link');
                }
            };
        }
        
        // ================================================================
        // UNIRSE A SESIÓN
        // ================================================================
        
        async function joinSession(encodedData) {
            console.log('🔄 Uniéndose a sesión...');
            
            try {
                const sessionData = JSON.parse(atob(encodedData));
                
                peerConnection = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                
                dataChannel = peerConnection.createDataChannel('tasks');
                setupDataChannel(dataChannel);
                
                peerConnection.ondatachannel = (event) => {
                    console.log('📥 Canal entrante recibido');
                    setupDataChannel(event.channel);
                };
                
                await peerConnection.setRemoteDescription(sessionData.sdp);
                
                sessionData.candidates.forEach(c => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(c));
                });
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                console.log('✅ Conectado a la sesión');
                showNotification('✅ Conectado al equipo');
                
            } catch(e) {
                console.error('Error al unirse:', e);
                alert('Error al unirse: ' + e.message);
            }
        }
        
        // ================================================================
        // CONFIGURAR DATA CHANNEL
        // ================================================================
        
        function setupDataChannel(channel) {
            const peerId = 'peer-' + Date.now() + '-' + Math.random().toString(36);
            
            channel.onopen = () => {
                console.log('📡 Canal abierto');
                
                channel.send(JSON.stringify({
                    type: 'info',
                    peerId: myId,
                    name: myName
                }));
                
                if (tasks.length > 0) {
                    channel.send(JSON.stringify({
                        type: 'sync',
                        tasks: tasks
                    }));
                }
                
                updateMembersList();
            };
            
            channel.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === 'info') {
                    peers.set(msg.peerId, { channel, name: msg.name });
                    updateMembersList();
                    updateAssigneeSelect();
                    showNotification(`👋 ${msg.name} se conectó`);
                    
                } else if (msg.type === 'new-task') {
                    if (!tasks.find(t => t.id === msg.task.id)) {
                        tasks.push(msg.task);
                        saveTasks();
                        renderTasks();
                        if (msg.task.assigneeId === myId) {
                            showNotification(`📋 Nueva tarea: ${msg.task.title}`);
                        }
                    }
                    
                } else if (msg.type === 'complete-task') {
                    const task = tasks.find(t => t.id === msg.taskId);
                    if (task) {
                        task.completed = true;
                        saveTasks();
                        renderTasks();
                    }
                    
                } else if (msg.type === 'sync') {
                    msg.tasks.forEach(t => {
                        if (!tasks.find(ex => ex.id === t.id)) {
                            tasks.push(t);
                        }
                    });
                    saveTasks();
                    renderTasks();
                }
            };
            
            channel.onclose = () => {
                peers.delete(peerId);
                updateMembersList();
                updateAssigneeSelect();
            };
            
            peers.set(peerId, { channel, name: 'Conectando...' });
        }
        
        function broadcast(msg) {
            peers.forEach(peer => {
                if (peer.channel.readyState === 'open') {
                    peer.channel.send(JSON.stringify(msg));
                }
            });
        }
        
        function updateMembersList() {
            let html = '';
            peers.forEach((peer, id) => {
                html += `<div class="member-item">
                    <span>👤 ${peer.name}</span>
                    <span class="status-dot ${peer.channel.readyState === 'open' ? 'connected' : ''}"></span>
                </div>`;
            });
            membersDiv.innerHTML = html;
        }
        
        function updateAssigneeSelect() {
            let options = '<option value="">Asignar a...</option>';
            options += `<option value="${myId}">${myName} (Yo)</option>`;
            peers.forEach((peer, id) => {
                options += `<option value="${id}">${peer.name}</option>`;
            });
            assigneeSelect.innerHTML = options;
        }
        
        function renderTasks() {
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="color:#666;text-align:center">No hay tareas</p>';
                return;
            }
            
            taskList.innerHTML = tasks.map(task => {
                const assigneeName = task.assigneeId === myId ? myName : 
                                   (peers.get(task.assigneeId)?.name || 'Desconocido');
                return `<div class="task-item" style="opacity:${task.completed?0.5:1}">
                    <div>
                        <div>${task.title}</div>
                        <small style="color:#6C4DFF">👤 ${assigneeName}</small>
                    </div>
                    <div>
                        ${task.assigneeId === myId && !task.completed ? 
                            `<button class="btn btn-secondary" style="padding:5px 10px" onclick="completeTask('${task.id}')">✅</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }
        
        function addTask(title, assigneeId) {
            const task = {
                id: 'task-' + Date.now() + '-' + Math.random().toString(36),
                title: title,
                assigneeId: assigneeId || myId,
                completed: false
            };
            
            tasks.push(task);
            saveTasks();
            renderTasks();
            
            broadcast({
                type: 'new-task',
                task: task
            });
        }
        
        window.completeTask = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = true;
                saveTasks();
                renderTasks();
                broadcast({
                    type: 'complete-task',
                    taskId: taskId
                });
            }
        };
        
        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        // ================================================================
        // SHARE LINK (Usa Web Share API si está disponible)
        // ================================================================
        
        async function shareLink() {
            const link = sessionLink.value;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Unirse a Team Tasks',
                        text: 'Únete a mi sesión de tareas',
                        url: link
                    });
                } catch(e) {}
            } else {
                sessionLink.select();
                document.execCommand('copy');
                showNotification('📋 Link copiado');
            }
        }
        
        // ================================================================
        // EVENT LISTENERS
        // ================================================================
        
        document.getElementById('create-session-btn').addEventListener('click', createSession);
        
        document.getElementById('join-session-btn').addEventListener('click', () => {
            const link = prompt('Pega el link de la sesión:');
            if (link) {
                const url = new URL(link);
                const encoded = url.searchParams.get('join');
                if (encoded) joinSession(encoded);
            }
        });
        
        document.getElementById('change-name-btn').addEventListener('click', () => {
            const newName = prompt('Tu nombre:', myName);
            if (newName) {
                myName = newName;
                localStorage.setItem('p2p-persistent-name', newName);
                document.getElementById('my-name-display').textContent = myName;
                updateAssigneeSelect();
                
                // Notificar a peers del cambio de nombre
                broadcast({
                    type: 'info',
                    peerId: myId,
                    name: myName
                });
            }
        });
        
        document.getElementById('copy-link-btn').addEventListener('click', () => {
            sessionLink.select();
            document.execCommand('copy');
            showNotification('📋 Link copiado');
        });
        
        document.getElementById('share-link-btn').addEventListener('click', shareLink);
        
        document.getElementById('add-task-btn').addEventListener('click', () => {
            const input = document.getElementById('task-input');
            const title = input.value.trim();
            if (title) {
                addTask(title, assigneeSelect.value);
                input.value = '';
            }
        });
        
        // Verificar link en URL
        const params = new URLSearchParams(window.location.search);
        if (params.has('join')) {
            if (confirm('¿Unirse a esta sesión?')) {
                joinSession(params.get('join'));
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        // Inicializar UI
        updateAssigneeSelect();
        renderTasks();
        
        console.log('✅ Sistema listo. ID persistente:', myId);
        console.log('📱 PWA lista para instalar');
        
    </script>
</body>
</html>
